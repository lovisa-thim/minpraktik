<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Min hemsida</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F9E7C9;
    font-family: 'Montserrat', sans-serif;
}

/* Rubrik uppe vänster */
.title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: 700;
}

/* Hamburgermenyn */
.menu-icon {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    z-index: 2;
}

.bar {
    width: 30px;
    height: 4px;
    background-color: white;
    margin: 6px 0;
}

/* Fullhöjdsmeny */
.menu {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 250px;
    background-color: #3A2606; /* ändra färg här */
    padding-top: 80px;
    display: none;
}

.menu a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 15px 20px;
    font-size: 18px;
}

.menu a:hover {
    background-color: rgba(255,255,255,0.1);
}

/* Bilder + scroll */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}


/* Container */
.image-container {
    position: relative;
    width: 60%;
    max-width: 500px;
}

/* Bild */
.image-container img {
    width: 100%;
    border-radius: 0;
    display: block;
}

.image-container:hover img {
    opacity: 0;
}

/* Overlay */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: transparent;
    opacity: 0;
    transition: 0.3s;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.image-container:hover .overlay {
    opacity: 1;
}


/* Text */
.text {
    color: black;
    font-size: 20px;
    padding: 15px 25px;
    background-color: transparent;
    
}

/* Hover */
.image-container:hover .overlay {
    opacity: 1;
}

</style>
</head>

<body>

<div class="title">Min hemsida</div>

<!-- Hamburgermeny -->
<div class="menu-icon" onclick="openMenu()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<!-- Meny -->
<div class="menu" id="menu" onmouseleave="closeMenu()">
    <a href="#">Produkter</a>
    <a href="#">Om</a>
</div>

<!-- Bilder -->
<div class="section">
    <div class="image-container">
        <img src="bild1.jpg" alt="Bild 1">
        <div class="overlay">
            <div class="text">1 000 000$</div>
        </div>
    </div>
</div>

<div class="section">
    <div class="image-container">
        <img src="bild2.jpg" alt="Bild 2">
        <div class="overlay">
            <div class="text">Andra bilden</div>
        </div>
    </div>
</div>



<script>
function openMenu() {
    document.getElementById("menu").style.display = "block";
}

function closeMenu() {
    document.getElementById("menu").style.display = "none";
}
</script>

</body>
</html>
