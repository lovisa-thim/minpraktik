<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Min hemsida</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #F9E7C9;
    font-family: 'Montserrat', sans-serif;
}

/* Rubrik uppe vänster */
.title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: 700;
}

/* Hamburgermenyn */
.menu-icon {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    z-index: 2;
}

.bar {
    width: 30px;
    height: 4px;
    background-color: white;
    margin: 6px 0;
}

/* Fullhöjdsmeny */
.menu {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: 250px;
    background-color: #3A2606; /* ändra färg här */
    padding-top: 80px;
    display: none;
}

.menu a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 15px 20px;
    font-size: 18px;
}

.menu a:hover {
    background-color: rgba(255,255,255,0.1);
}

/* Bilder + scroll */
.section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.section img {
    max-width: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="title">Min hemsida</div>

<!-- Hamburgermeny -->
<div class="menu-icon" onclick="openMenu()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

<!-- Meny -->
<div class="menu" id="menu" onmouseleave="closeMenu()">
    <a href="#">Produkter</a>
    <a href="#">Om</a>
</div>

<!-- Bilder -->
<div class="section">
    <img src="bild1.jpg" alt="Bild 1">
</div>

<div class="section">
    <img src="bild2.jpg" alt="Bild 2">
</div>

<script>
function openMenu() {
    document.getElementById("menu").style.display = "block";
}

function closeMenu() {
    document.getElementById("menu").style.display = "none";
}
</script>

</body>
</html>
